# ============================================================
# scRNA-seq Analysis Configuration
# Sample: dlg (Drosophila melanogaster, FlyBase r6.49)
# ============================================================

# --- 数据路径 ---
data:
  base_dir: "/data2/ChangeJam/scRNA_seq_scrib_CellCompetition/1.Expression/expressions"
  sample: "dlg"
  # 10x 标准三件套文件名
  matrix: "matrix.mtx.gz"
  barcodes: "barcodes.tsv.gz"
  features: "features.tsv.gz"

# --- 输出路径 ---
output:
  base_dir: "/home/test01/projects/scRNA_analysis/results"
  figures_dir: "/home/test01/projects/scRNA_analysis/results/figures"
  h5ad_dir: "/home/test01/projects/scRNA_analysis/results/data"

# --- 分析参数 ---
params:
  species: "Drosophila_melanogaster"
  reference_genome: "FlyBase_r6.49"

  # 质控参数（将在 02_qc_filtering.py 中使用）
  qc:
    min_genes: 200        # 每个细胞至少检测到的基因数
    min_cells: 3          # 每个基因至少在多少个细胞中表达
    max_genes: 7000       # 每个细胞最多检测到的基因数（过滤双细胞/异常细胞）
    # 果蝇没有线粒体基因的常规 MT 标记，后续会确认
    max_pct_mt: 20        # 线粒体基因比例上限（暂定）

  # 降维参数
  dim_reduction:
  n_pcs: 50               # PCA 保留的主成分数
  n_neighbors: 15         # 构建 KNN 图的邻居数

  # 聚类参数
  clustering:
  resolution: 0.8         # Leiden 聚类分辨率
