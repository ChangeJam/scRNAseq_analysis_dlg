# ============================================================
# scRNA-seq Analysis Configuration
# Sample: dlg (Drosophila melanogaster, FlyBase r6.49)
# Tissue: Third instar larval eye-antennal disc
# Context: Cell competition (dlg^m52, homozygous loser vs. wild-type winner)
# ============================================================

# --- 数据路径 ---
paths:
  # 10x Genomics CellRanger 输出的标准三件套所在目录
  raw_data_dir: "/data2/ChangeJam/scRNA_seq_scrib_CellCompetition/1.Expression/expressions/dlg"
  # 流程中间产物的 h5ad 文件存放目录
  processed_dir: "/data2/ChangeJam/scRNA_seq_scrib_dlg/processed_data"
  # 最终结果数据（如 DEG 表格等）
  results_dir: "/data2/ChangeJam/scRNA_seq_scrib_dlg/results"
  # 所有图表输出目录
  figures_dir: "/data2/ChangeJam/scRNA_seq_scrib_dlg/figures"

# --- 分析参数 ---
params:
  species: "Drosophila_melanogaster"
  reference_genome: "FlyBase_r6.49"

  # 质控参数（02_qc_filtering.py 使用）
  qc:
    mad_thresh: 5
    mt_genes:
      - "FBgn0015553"
      - "FBgn0015558"
      - "FBgn0015561"
      - "FBgn0015550"
    mt_genes_complete:
      # 果蝇线粒体基因组完整基因列表 (37 个)  
      # 来源：org.Dm.eg.db (CHR=MT)
      - 'FBgn0013703'
      - 'FBgn0013700'
      - 'FBgn0013680'
      - 'FBgn0013709'
      - 'FBgn0013690'
      - 'FBgn0013710'
      - 'FBgn0013674'
      - 'FBgn0013699'
      - 'FBgn0013675'
      - 'FBgn0013697'
      - 'FBgn0013691'
      - 'FBgn0013673'
      - 'FBgn0013672'
      - 'FBgn0013676'
      - 'FBgn0013694'
      - 'FBgn0013681'
      - 'FBgn0013689'
      - 'FBgn0013704'
      - 'FBgn0013701'
      - 'FBgn0013705'
      - 'FBgn0013692'
      - 'FBgn0013693'
      - 'FBgn0013684'
      - 'FBgn0013695'
      - 'FBgn0262952'
      - 'FBgn0013683'
      - 'FBgn0013707'
      - 'FBgn0013702'
      - 'FBgn0013685'
      - 'FBgn0013678'
      - 'FBgn0013706'
      - 'FBgn0013679'
      - 'FBgn0013698'
      - 'FBgn0013686'
      - 'FBgn0013708'
      - 'FBgn0013688'
      - 'FBgn0013696'
    expected_doublet_rate: 0.08
    scrublet_random_state: 0
    

  # 归一化参数（03_normalization.py 使用）
  normalization:
    target_sum: 10000

  # 高可变基因参数（04_variable_genes.py 使用）
  hvg:
    n_top_genes: 2000
    flavor: "seurat"

  # 降维参数（05_pca.py & 06_neighbors.py 使用）
  dim_reduction:
    n_pcs: 50
    n_neighbors: 15
    n_pcs_for_graph: 30

  # 聚类参数（07_clustering.py 使用）
  clustering:
    resolution: 1.0         # Leiden 聚类分辨率